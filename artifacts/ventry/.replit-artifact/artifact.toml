kind = "web"
previewPath = "/"
title = "Availo Ventry"
version = "1.0.0"
id = "artifacts/ventry"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20853
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ventry run dev"

[services.env]
PORT = "20853"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ventry", "run", "build"]
publicDir = "artifacts/ventry/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
